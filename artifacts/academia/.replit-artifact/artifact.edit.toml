kind = "web"
previewPath = "/"
title = "Academia"
version = "1.0.0"
id = "artifacts/academia"

[[services]]
localPort = 3000
name = "web"
paths = ["/"]

[services.env]
PORT = "3000"

[services.development]
run = "pnpm --filter @workspace/academia run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/academia", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["pnpm", "--filter", "@workspace/academia", "run", "start"]

[services.production.run.env]
NODE_ENV = "production"
PORT = "3000"
